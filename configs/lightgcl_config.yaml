# LightGCL Configuration for VnExpress Dataset

# Data
data:
  path: "data"
  min_user_interactions: 2
  min_article_interactions: 2
  test_ratio: 0.2
  force_reload: false

# Model
model:
  embedding_dim: 64
  n_layers: 3
  svd_q: 5
  dropout: 0.0

# Loss
loss:
  reg_weight: 1.0e-4
  ssl_weight: 0.1
  temperature: 0.2

# Training
training:
  lr: 0.001
  batch_size: 2048
  n_epochs: 100
  eval_every: 5
  patience: 1000
  seed: 42

# Evaluation
evaluation:
  k_list: [10, 20, 50]

# Device
device: "cuda"

# Save path
save_path: "checkpoints/lightgcl_best.pth"